name: Deploy Voice Analysis

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths:
      - 'voice-analysis/**'

# Use OIDC token for Azure authentication (federated credentials).
# Configure in Azure AD:
#   1. Create an App Registration (or use existing)
#   2. Add a federated credential for GitHub Actions:
#      - Organization: <your-github-org>
#      - Repository: <your-repo>
#      - Entity: branch (main) or environment (production)
#   3. Assign Contributor role on the resource group
#   4. Set these secrets in GitHub repo settings:
#      - AZURE_CLIENT_ID
#      - AZURE_TENANT_ID
#      - AZURE_SUBSCRIPTION_ID

permissions:
  id-token: write   # Required for OIDC federated credentials
  contents: read

env:
  RESOURCE_GROUP: rg-voice-analysis
  LOCATION: northeurope
  APP_NAME: voice-analysis
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC / Federated Credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --output none

      - name: Deploy base infrastructure (Bicep)
        id: infra
        run: |
          OUTPUTS=$(az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file voice-analysis/infra/main.bicep \
            --parameters \
              location="$LOCATION" \
              appName="$APP_NAME" \
            --query "properties.outputs" \
            --output json)

          ACR_NAME=$(echo "$OUTPUTS" | jq -r '.acrName.value')
          ACR_LOGIN_SERVER=$(echo "$OUTPUTS" | jq -r '.acrLoginServer.value')
          ENV_NAME=$(echo "$OUTPUTS" | jq -r '.envName.value')

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ steps.infra.outputs.acr_name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${APP_NAME}:${IMAGE_TAG}" \
            --file voice-analysis/Dockerfile \
            voice-analysis/

      - name: Create or update Container App
        run: |
          ACR_SERVER="${{ steps.infra.outputs.acr_login_server }}"
          ENV_NAME="${{ steps.infra.outputs.env_name }}"
          FULL_IMAGE="${ACR_SERVER}/${APP_NAME}:${IMAGE_TAG}"

          # Check if app exists
          if az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$FULL_IMAGE" \
              --min-replicas 1 \
              --max-replicas 3 \
              --output none
          else
            echo "Creating Container App..."
            az containerapp create \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ENV_NAME" \
              --image "$FULL_IMAGE" \
              --registry-server "$ACR_SERVER" \
              --registry-identity system \
              --system-assigned \
              --target-port 8000 \
              --ingress external \
              --cpu 2.0 \
              --memory 4Gi \
              --min-replicas 1 \
              --max-replicas 3 \
              --env-vars "HF_HOME=/app/hf_cache" \
              --output none

            echo "Assigning AcrPull role to Container App managed identity..."
            APP_PRINCIPAL=$(az containerapp show \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "identity.principalId" \
              --output tsv)
            ACR_ID=$(az acr show \
              --name "${{ steps.infra.outputs.acr_name }}" \
              --resource-group "$RESOURCE_GROUP" \
              --query id \
              --output tsv)
            az role assignment create \
              --assignee "$APP_PRINCIPAL" \
              --role AcrPull \
              --scope "$ACR_ID" \
              --output none
          fi

      - name: Wait for deployment and health check
        run: |
          APP_URL=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "App URL: https://${APP_URL}"
          echo "Waiting for health check..."

          for i in $(seq 1 30); do
            if curl -sf "https://${APP_URL}/health" > /dev/null 2>&1; then
              echo "✓ Health check passed"
              curl -s "https://${APP_URL}/health" | jq .
              exit 0
            fi
            echo "  Attempt $i/30 — waiting 10s..."
            sleep 10
          done

          echo "✗ Health check failed after 5 minutes"
          exit 1

      - name: Print deployment summary
        if: success()
        run: |
          APP_URL=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | https://${APP_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | ${APP_NAME}:${IMAGE_TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
