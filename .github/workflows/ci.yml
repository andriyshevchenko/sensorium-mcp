name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  supervisor-build:
    name: Build Supervisor (Go)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        goos: [linux, windows, darwin]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: supervisor/go.mod

      - name: Build supervisor (${{ matrix.goos }})
        working-directory: supervisor
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
        run: go build -o /dev/null .

      - name: Test supervisor
        if: matrix.goos == 'linux'
        working-directory: supervisor
        run: go test -v -count=1 ./...
