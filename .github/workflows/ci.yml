name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  supervisor-build:
    name: Build Supervisor (.NET)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build supervisor
        run: dotnet build supervisor-dotnet/Sensorium.Supervisor.csproj -c Release

      - name: Test supervisor
        run: dotnet test supervisor-dotnet/tests/Sensorium.Supervisor.Tests.csproj -c Release --no-restore
