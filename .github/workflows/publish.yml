name: Publish to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type (patch | minor | major) or an explicit version (e.g. 1.2.3)"
        required: true
        default: patch

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so `npm version` can commit & tag
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # For push-to-main: only publish if local version > npm version
      - name: Check if version needs publishing
        id: version_check
        if: github.event_name == 'push'
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view sensorium-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          IS_NEWER=$(node -e "
            const [a,b] = ['$LOCAL_VERSION','$NPM_VERSION'].map(v=>v.split('.').map(Number));
            process.stdout.write(a[0]>b[0]||(a[0]===b[0]&&(a[1]>b[1]||(a[1]===b[1]&&a[2]>b[2])))?'true':'false');
          ")
          if [ "$IS_NEWER" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $LOCAL_VERSION (npm has $NPM_VERSION)."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION <= $NPM_VERSION on npm — skipping publish."
          fi

      - name: Publish to NPM (auto on push)
        if: github.event_name == 'push' && steps.version_check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      # For manual dispatch: bump version, tag, then publish
      - name: Validate version input
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -e
          VERSION="${{ github.event.inputs.version }}"
          if [ "$VERSION" = "patch" ] || [ "$VERSION" = "minor" ] || [ "$VERSION" = "major" ]; then
            exit 0
          fi
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            exit 0
          fi
          echo "Error: Invalid version input '$VERSION'. Expected 'patch', 'minor', 'major', or a semantic version like '1.2.3'." >&2
          exit 1

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # [skip ci] prevents CI from running on the version-bump commit; CI may still run on the subsequent tag push.
          npm version '${{ github.event.inputs.version }}' --message "chore: release v%s [skip ci]"

      - name: Push version commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: git push --follow-tags

      - name: Publish to NPM (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

  supervisor-binaries:
    name: Build Supervisor Binaries
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: supervisor/go.mod

      - name: Get version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: supervisor
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o "../sensorium-supervisor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supervisor-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sensorium-supervisor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: supervisor-binaries
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
          make_latest: true
