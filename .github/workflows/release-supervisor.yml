name: Release Supervisor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-supervisor:
    name: Build and Release Supervisor
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read package version
        id: version
        run: |
          echo "package_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "version_tag=supervisor-v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Windows amd64 supervisor
        run: |
          dotnet publish supervisor-dotnet/Sensorium.Supervisor.csproj \
            -r win-x64 \
            -c Release \
            --self-contained \
            -p:PublishSingleFile=true \
            -o publish/
          mv publish/sensorium-supervisor.exe sensorium-supervisor-windows-amd64.exe

      - name: Recreate floating release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: supervisor-latest
          RELEASE_NAME: ${{ steps.version.outputs.version_tag }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          ASSET_NAME: sensorium-supervisor-windows-amd64.exe
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --cleanup-tag
          fi

          gh release create "$RELEASE_TAG" "$ASSET_NAME" \
            --title "$RELEASE_NAME" \
            --notes "Automated Windows amd64 supervisor build for package version $PACKAGE_VERSION." \
            --target "$GITHUB_SHA"
